<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111111; }
        .plate-font { font-family: 'JetBrains Mono', monospace; }
        
        /* Monochromatic UI Components */
        .flat-card { 
            background-color: #222222;
            border: 1px solid #333333;
        }
        .header-bg {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333333;
        }
        .table-head {
            background-color: #2a2a2a;
        }
        
        .live-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Custom Scrollbar for Grayscale */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="text-[#aaaaaa] min-h-screen">
    
    <!-- Top Navigation -->
    <nav class="header-bg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 grid grid-cols-1 sm:grid-cols-3 items-center gap-4">
            
            <!-- Left empty space -->
            <div class="hidden sm:block"></div>

            <!-- Centered Branding -->
            <div class="flex flex-col items-center justify-center">
                <h1 class="text-xl font-bold tracking-tight text-[#eeeeee] flex items-center">
                    PARKING<span class="text-white ml-2 font-light">SYSTEM</span>
                </h1>
                <div class="flex items-center mt-1">
                    <span class="live-pulse"></span>
                    <span class="text-[10px] uppercase tracking-widest text-[#666666] font-bold">Monitor Active</span>
                </div>
            </div>

            <!-- Right Aligned Time -->
            <div class="text-center sm:text-right">
                <p id="current-time" class="text-xs font-mono text-[#888888]"></p>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Stats Summary Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="flat-card rounded-lg p-5">
                <p class="text-[#666666] text-[10px] font-bold uppercase tracking-widest mb-1">Daily Entries</p>
                <h3 class="text-3xl font-bold text-white" id="stat-entries">--</h3>
            </div>
            <div class="flat-card rounded-lg p-5 border-l-4 border-l-red-600">
                <p class="text-[#666666] text-[10px] font-bold uppercase tracking-widest mb-1 text-red-500/50">Incidents</p>
                <h3 class="text-3xl font-bold text-white" id="stat-incidents">--</h3>
            </div>
            <div class="flat-card rounded-lg p-5">
                <p class="text-[#666666] text-[10px] font-bold uppercase tracking-widest mb-1">Revenue (RWF)</p>
                <h3 class="text-3xl font-bold text-white" id="stat-revenue">--</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Vehicle Logs Section -->
            <div class="lg:col-span-2">
                <div class="flat-card rounded-lg overflow-hidden">
                    <div class="px-6 py-4 border-b border-[#333333] flex justify-between items-center">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-white">Vehicle Activity Log</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="table-head">
                                <tr>
                                    <th class="px-6 py-3 text-[10px] font-bold text-[#888888] uppercase tracking-widest">Plate</th>
                                    <th class="px-6 py-3 text-[10px] font-bold text-[#888888] uppercase tracking-widest">In / Out</th>
                                    <th class="px-6 py-3 text-[10px] font-bold text-[#888888] uppercase tracking-widest">Fee</th>
                                    <th class="px-6 py-3 text-[10px] font-bold text-[#888888] uppercase tracking-widest">Status</th>
                                </tr>
                            </thead>
                            <tbody id="vehicle-table" class="divide-y divide-[#333333]">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Incident Logs Section -->
            <div>
                <div class="flat-card rounded-lg overflow-hidden">
                    <div class="px-6 py-4 border-b border-[#333333]">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-white">Security Alerts</h2>
                    </div>
                    <div class="p-4 space-y-3" id="incident-feed">
                        <!-- Incidents injected here -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchLogs() {
            try {
                const vehicleResponse = await fetch('http://localhost:5000/api/vehicle-logs')
                const vehicleLogs = await vehicleResponse.json()
                const incidentResponse = await fetch('http://localhost:5000/api/incident-logs')
                const incidentLogs = await incidentResponse.json()

                // Update Stats
                document.getElementById('stat-entries').innerText = vehicleLogs.length;
                document.getElementById('stat-incidents').innerText = incidentLogs.filter(i => i.incident_type === 'unauthorized_exit').length;
                const totalRev = vehicleLogs.reduce((acc, log) => acc + (log.fee || 0), 0);
                document.getElementById('stat-revenue').innerText = totalRev.toLocaleString();

                // Build Table
                const vehicleTable = document.getElementById('vehicle-table')
                vehicleTable.innerHTML = vehicleLogs.map(log => `
                    <tr class="hover:bg-[#2a2a2a] transition-colors">
                        <td class="px-6 py-4">
                            <span class="plate-font bg-[#444444] text-white px-2 py-1 rounded text-xs border border-[#555555]">
                                ${log.plate_number}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[11px] text-[#888888]">IN: <span class="text-[#ccc]">${log.entry_timestamp || '-'}</span></div>
                            <div class="text-[11px] text-[#888888]">OUT: <span class="text-[#ccc]">${log.exit_timestamp || '-'}</span></div>
                        </td>
                        <td class="px-6 py-4 text-xs font-mono text-white">
                            ${log.fee !== null ? `${log.fee} RWF` : '-'}
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-0.5 text-[9px] font-bold uppercase rounded border ${
                                log.payment_status === 'cleared' ? 'bg-green-900/20 text-green-500 border-green-500/30' : 
                                log.payment_status === 'pending' ? 'bg-orange-900/20 text-orange-500 border-orange-500/30' : 
                                'bg-[#333] text-[#777] border-[#444]'
                            }">
                                ${log.payment_status}
                            </span>
                        </td>
                    </tr>
                `).join('')

                // Build Alert Feed
                const incidentFeed = document.getElementById('incident-feed')
                incidentFeed.innerHTML = incidentLogs.map(log => `
                    <div class="p-3 rounded border ${log.incident_type === 'unauthorized_exit' ? 'bg-red-900/10 border-red-900/50' : 'bg-[#2a2a2a] border-[#333]'}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="plate-font text-[10px] font-bold text-white">${log.plate_number || '??'}</span>
                            <span class="text-[9px] text-[#555] font-mono">${log.timestamp.split(' ')[1]}</span>
                        </div>
                        <p class="text-[10px] font-bold uppercase tracking-tight ${log.incident_type === 'unauthorized_exit' ? 'text-red-500' : 'text-orange-500'}">
                            ${log.incident_type.replace('_', ' ')}
                        </p>
                    </div>
                `).join('')

            } catch (error) {
                console.error('Error fetching logs:', error)
            }
        }

        fetchLogs()
        setInterval(fetchLogs, 5000)
    </script>
</body>
</html>
